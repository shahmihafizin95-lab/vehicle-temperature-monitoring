<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Login
    </title>

    <link rel="stylesheet"
          href="auth.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

    <div class="auth-box">

        <h1>
            🚗 Vehicle Monitoring
        </h1>

        <h2>
            Login
        </h2>

        <input
            type="email"
            id="email"
            placeholder="Enter Email">

        <input
            type="password"
            id="password"
            placeholder="Enter Password">

        <button onclick="login()">

            Login

        </button>

        <p>

            Don't have an account?

            <a href="register.html">

                Register Here

            </a>

        </p>

    </div>

    <script src="auth.js"></script>

    <script>

        async function login()
        {
            const email =
            document.getElementById(
                "email"
            ).value;

            const password =
            document.getElementById(
                "password"
            ).value;

            const {
                error
            }
            =
            await client.auth
            .signInWithPassword({

                email,

                password

            });

            if(error)
            {
                alert(
                    error.message
                );
            }

            else
            {
                alert(
                    "Login Successful"
                );

                window.location =
                "dashboard.html";
            }
        }

    </script>

</body>

</html>
