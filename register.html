<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Register
    </title>

    <link rel="stylesheet"
          href="auth.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

    <div class="auth-box">

        <h1>
            🚗 Vehicle Monitoring
        </h1>

        <h2>
            Register
        </h2>

        <input
            type="text"
            id="username"
            placeholder="Enter Username">

        <input
            type="email"
            id="email"
            placeholder="Enter Email">

        <input
            type="password"
            id="password"
            placeholder="Enter Password">

        <button onclick="registerUser()">

            Register

        </button>

        <p>

            Already have an account?

            <a href="login.html">

                Login Here

            </a>

        </p>

    </div>

    <script src="auth.js"></script>

    <script>

        async function registerUser()
        {
            const username =
            document.getElementById(
                "username"
            ).value;

            const email =
            document.getElementById(
                "email"
            ).value;

            const password =
            document.getElementById(
                "password"
            ).value;

            // REGISTER AUTH

            const {
                data,
                error
            }
            =
            await client.auth.signUp({

                email,

                password

            });

            if(error)
            {
                alert(
                    error.message
                );

                return;
            }

            // SAVE PROFILE

            const userId =
            data.user.id;

            const {
                error: profileError
            }
            =
            await client
            .from("profiles")
            .insert([
                {
                    id: userId,

                    username:
                    username
                }
            ]);

            if(profileError)
{
    console.log(profileError);

    alert(
        profileError.message
    );

    return;
}

            alert(
                "Registration Successful"
            );

            window.location =
            "login.html";
        }

    </script>

</body>

</html>
